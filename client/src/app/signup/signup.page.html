<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" />
    </ion-buttons>
    <ion-title>Sign up</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formRoot]="signupForm" (submit)="signup($event)" novalidate>
    <ion-list lines="none">
      <ion-item>
        <ion-input
          [class.invalid]="signupForm.firstName().invalid() && signupForm.firstName().dirty()"
          [formField]="signupForm.firstName"
          [required]="true"
          errorText="First Name is required"
          label="First Name"
          labelPlacement="stacked"
          type="text"
        />
      </ion-item>

      <ion-item>
        <ion-input
          [class.invalid]="signupForm.lastName().invalid() && signupForm.lastName().dirty()"
          [formField]="signupForm.lastName"
          [required]="true"
          errorText="Last Name is required"
          label="Last Name"
          labelPlacement="stacked"
          type="text"
        />
      </ion-item>

      <ion-item>
        <ion-input
          [class.invalid]="signupForm.email().invalid() && signupForm.email().dirty()"
          [formField]="signupForm.email"
          [required]="true"
          errorText="Email is required"
          label="Email"
          labelPlacement="stacked"
          type="email"
        />
      </ion-item>

      <ion-item>
        <ion-input
          [class.invalid]="signupForm.userName().invalid() && signupForm.userName().dirty()"
          [formField]="signupForm.userName"
          [required]="true"
          errorText="Username is required"
          label="Username"
          labelPlacement="stacked"
          type="text"
        />
      </ion-item>

      <ion-item>
        <ion-input
          [class.invalid]="signupForm.password().invalid() && signupForm.password().dirty()"
          [formField]="signupForm.password"
          [required]="true"
          errorText="Password is required"
          label="Password"
          labelPlacement="stacked"
          type="password"
        />
      </ion-item>

      <div class="ion-padding">
        <ion-button [disabled]="!signupForm().valid()" color="primary" expand="block" type="submit"
          >Sign up</ion-button
        >
      </div>
    </ion-list>
  </form>
</ion-content>
