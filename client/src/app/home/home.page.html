<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button />
    </ion-buttons>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p>
    Message from the secret service:
    <strong>
      @if (message.hasValue()) {
        {{ message.value() }}
      } @else if (message.error()) {
        Error
      } @else {
        Loading ...
      }
    </strong>
  </p>
</ion-content>
