<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" />
    </ion-buttons>
    <ion-title>Forgot My Password</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (!success) {
    <form [formRoot]="resetForm" (submit)="reset($event)" novalidate>
      <ion-list>
        <ion-item>
          <ion-input
            [class.invalid]="
              resetForm.usernameOrEmail().invalid() && resetForm.usernameOrEmail().dirty()
            "
            [formField]="resetForm.usernameOrEmail"
            [required]="true"
            errorText="Username or Email is required"
            label="Username or Email"
            labelPlacement="stacked"
            type="text"
          />
        </ion-item>
        <div class="ion-padding">
          <ion-button [disabled]="!resetForm().valid()" color="primary" expand="block" type="submit"
            >Reset my Password
          </ion-button>
        </div>
      </ion-list>
    </form>
  }
  @if (success) {
    <ion-card>
      <ion-card-content> Password Reset Email sent. Check your inbox. </ion-card-content>
    </ion-card>
  }
</ion-content>
